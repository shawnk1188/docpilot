version: "3.9"

networks:
  docpilot-net:
    driver: bridge

volumes:
  qdrant-data:
  ollama-data:

services:

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - docpilot-net
    restart: unless-stopped

  # Ollama is optional — only needed when LLM_PROVIDER=ollama
  # Start it with: podman-compose --profile local up
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama
    profiles:
      - local
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - docpilot-net
    restart: unless-stopped

  fastapi-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-app
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/app/docs
    networks:
      - docpilot-net
    depends_on:
      - qdrant
    restart: unless-stopped

  streamlit-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamlit-app
    env_file: .env
    ports:
      - "8501:8501"
    networks:
      - docpilot-net
    depends_on:
      - fastapi-app
    restart: unless-stopped

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - docpilot-net
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=docpilot
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - docpilot-net
    restart: unless-stopped